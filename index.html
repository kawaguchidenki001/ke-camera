<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0d9aa0" />
  <meta name="description" content="県営北方住宅 LED 改修工事 専用 小黒板カメラ" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="北方カメラ" />

  <title>北方カメラ</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />

  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<header class="app-header" id="appHeader">
  <button class="header-btn" id="btnMenu" aria-label="メニュー" type="button">
    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
      <path fill="currentColor" d="M3 6h18v2H3zM3 11h18v2H3zM3 16h18v2H3z"/>
    </svg>
  </button>
  <h1 class="app-title">北方カメラ</h1>
  <button class="header-btn" id="authStatusBtn" aria-label="認証状態" type="button">
    <span id="authIndicator" class="auth-indicator off" aria-hidden="true"></span>
  </button>
</header>

<main class="app-main" id="appMain">

  <!-- ========== スプラッシュ ========== -->
  <section class="screen active" data-screen="splash">
    <div class="splash-wrap">
      <div class="splash-icon" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="64" height="64" fill="none" stroke="#0d9aa0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 22h6l4-6h16l4 6h6a4 4 0 0 1 4 4v22a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V26a4 4 0 0 1 4-4Z"/>
          <circle cx="32" cy="34" r="9"/>
          <circle cx="32" cy="34" r="4" fill="#0d9aa0"/>
        </svg>
      </div>

      <h2 class="splash-title" id="projName">県営北方住宅...</h2>
      <p class="splash-sub">
        <span id="projNumber">県住工第1号</span>
        ・
        <span id="projLocation">本巣郡北方町</span>
      </p>
      <p class="splash-company"><span id="projCompany">河口電機株式会社</span></p>

      <div class="splash-actions">
        <button class="btn btn-primary btn-xl" id="btnLoginSplash" type="button">
          Google でログイン
        </button>
        <button class="btn btn-ghost" id="btnSkipLogin" type="button">
          ログインせずに使う(後で送信)
        </button>
      </div>
      <p class="splash-mode-hint">
        ログインすれば撮影と同時に Drive 保存。<br>
        ログインしない場合は端末に保存し、後でまとめて送信できます。
      </p>

      <p class="splash-version">小黒板カメラ <span id="appVersion">v1.0.0</span></p>
    </div>
  </section>

  <!-- ========== ホーム(選択画面) ========== -->
  <section class="screen" data-screen="home">
    <div class="home-project">
      <span class="hp-num" id="projNumberHome">県住工第1号</span>
      <span class="hp-name">県営北方住宅 LED 改修</span>
    </div>

    <div class="card-group">

      <button class="big-card" id="cardBuilding" type="button">
        <span class="bc-label">棟</span>
        <span class="bc-value" id="cardBuildingVal">未選択</span>
        <span class="bc-chevron" aria-hidden="true">›</span>
      </button>

      <button class="big-card" id="cardRoom" type="button">
        <span class="bc-label">部屋</span>
        <span class="bc-value" id="cardRoomVal">未選択</span>
        <span class="bc-chevron" aria-hidden="true">›</span>
      </button>

      <button class="big-card" id="cardFixture" type="button">
        <span class="bc-label">照明器具</span>
        <span class="bc-value" id="cardFixtureVal">未選択</span>
        <span class="bc-chevron" aria-hidden="true">›</span>
      </button>

      <button class="big-card" id="cardStage" type="button">
        <span class="bc-label">施工段階</span>
        <span class="bc-value" id="cardStageVal">未選択</span>
        <span class="bc-chevron" aria-hidden="true">›</span>
      </button>

    </div>

    <p class="next-hint" id="nextSeqHint"></p>

    <!-- 未送信写真カード(未送信が1枚以上あるとき表示) -->
    <button class="outbox-card" id="outboxCard" type="button" hidden>
      <div class="oc-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M19 8h-3V3H8v5H5l7 7 7-7zM5 19v2h14v-2H5z" transform="rotate(180 12 12)"/>
        </svg>
      </div>
      <div class="oc-body">
        <span class="oc-title">未送信の写真</span>
        <span class="oc-count" id="outboxCount">0 枚</span>
      </div>
      <span class="oc-chevron" aria-hidden="true">›</span>
    </button>

    <button class="btn btn-primary btn-xl shutter-go" id="btnGoCamera" type="button" disabled>
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="currentColor" d="M9.4 5L8 7H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2h-4l-1.4-2H9.4zM12 17a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
      </svg>
      カメラを起動
    </button>
  </section>

  <!-- ========== カメラ画面(GenCan風) ========== -->
  <section class="screen camera-screen" data-screen="camera">
    <div class="cam-head">
      <button class="cam-back" id="btnCameraBack" type="button">← 戻る</button>
      <span class="cam-title">小黒板カメラ</span>
      <div style="width:64px;"></div>
    </div>

    <div class="cam-sitebar" id="camSitebar">
      <span>現場:</span>
      <b id="camSitebarText">—</b>
    </div>

    <div class="bcam-wrap" id="bcamWrap">
      <video id="videoEl" autoplay playsinline muted></video>
      <div class="bcam-tools">
        <button class="bcam-tool" id="btnSwitchCamera" aria-label="カメラ切替" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 5h-3.17L15 3H9L7.17 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zM12 18a5 5 0 0 1-5-5H5l3-3 3 3H9a3 3 0 0 0 3 3 3 3 0 0 0 0-6"/></svg>
        </button>
      </div>
      <div class="bov-bd" id="boardOverlay" style="display:none;"></div>
      <div class="bcam-zoominfo" id="boardZoomInfo">1.0x</div>
    </div>

    <div class="bsize-row">
      <label>黒板の大きさ</label>
      <input type="range" id="boardSizeRange" min="20" max="55" value="37" />
      <span class="bsize-val" id="boardSizeVal">37%</span>
    </div>

    <label class="bchk">
      <input type="checkbox" id="boardNoBoard" />
      黒板なしも保存する(黒板あり＋なしの2枚)
    </label>

    <div class="board-grid" id="boardFormWrap">
      <div class="brow">
        <span class="blbl3">工事名</span>
        <input class="binp" id="boardProjName" placeholder="工事名" />
        <button class="bfs" data-step="a" data-d="-0.1" type="button">−</button>
        <button class="bfs" data-step="a" data-d="0.1"  type="button">＋</button>
      </div>
      <div class="brow">
        <span class="blbl3">場所</span>
        <input class="binp" id="boardPlace" placeholder="場所" />
        <button class="bfs" data-step="b" data-d="-0.1" type="button">−</button>
        <button class="bfs" data-step="b" data-d="0.1"  type="button">＋</button>
      </div>
      <div class="brow">
        <span class="blbl3">照明器具</span>
        <input class="binp" id="boardFixture" placeholder="照明器具(例: a059)" />
        <button class="bfs" data-step="c" data-d="-0.1" type="button">−</button>
        <button class="bfs" data-step="c" data-d="0.1"  type="button">＋</button>
      </div>
      <div class="brow">
        <span class="blbl3">施工段階</span>
        <input class="binp" id="boardStage" placeholder="施工段階(例: 施工前)" />
        <button class="bfs" data-step="d" data-d="-0.1" type="button">−</button>
        <button class="bfs" data-step="d" data-d="0.1"  type="button">＋</button>
      </div>
      <div class="brow">
        <span class="blbl3">会社名</span>
        <input class="binp" id="boardCompany" placeholder="会社名" />
        <button class="bfs" data-step="e" data-d="-0.1" type="button">−</button>
        <button class="bfs" data-step="e" data-d="0.1"  type="button">＋</button>
      </div>
    </div>

    <p class="enote">
      黒板はドラッグで位置を移動できます。各行の −／＋ で文字サイズを調整できます。
    </p>

    <div class="scroll-pad"></div>

    <div class="bshoot-bar" id="boardBarLive">
      <button class="savebtn hqbtn" id="btnShootHQ" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5a2 2 0 0 1 2-2h1.6l1.4-2h6l1.4 2H19a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><circle cx="12" cy="12.5" r="3"/></svg>
        最高画質
      </button>
      <button class="savebtn" id="btnShoot" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5a2 2 0 0 1 2-2h1.6l1.4-2h6l1.4 2H19a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><circle cx="12" cy="12.5" r="3"/></svg>
        撮影して保存
      </button>
    </div>
  </section>

  <!-- ========== Outbox 画面 ========== -->
  <section class="screen" data-screen="outbox">
    <div class="screen-head">
      <button class="header-btn dark" id="btnOutboxBack" aria-label="戻る" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20z"/></svg>
      </button>
      <h2>未送信写真</h2>
      <span class="outbox-summary" id="outboxSummary"></span>
    </div>

    <div class="outbox-actions">
      <button class="btn btn-primary btn-lg" id="btnUploadAll" type="button">
        すべて Drive に送信
      </button>
      <button class="btn btn-ghost" id="btnRefreshOutbox" type="button">再読み込み</button>
    </div>

    <div class="outbox-progress" id="outboxProgress" hidden>
      <div class="op-bar"><div class="op-fill" id="opFill"></div></div>
      <p class="op-text" id="opText">送信中…</p>
    </div>

    <div class="outbox-list" id="outboxList"></div>

    <div class="outbox-empty" id="outboxEmpty" hidden>
      <p>未送信の写真はありません</p>
    </div>
  </section>

</main>

<!-- ========== メニュードロワー ========== -->
<nav class="menu" id="menu">
  <div class="menu-backdrop" data-close-menu></div>
  <div class="menu-panel">
    <div class="menu-head">
      <strong>北方カメラ</strong>
      <button class="header-btn dark" data-close-menu aria-label="閉じる" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <ul class="menu-list">
      <li><button id="menuChangePhoto" type="button">撮影者を変更</button></li>
      <li><button id="menuReloadConfig" type="button">設定を再読み込み(Sheets)</button></li>
      <li><button id="menuSignOut" type="button">サインアウト</button></li>
    </ul>
    <div class="menu-foot">
      <p class="menu-version">小黒板カメラ <span id="appVersionMenu"></span></p>
      <p class="menu-config-source" id="configSource"></p>
    </div>
  </div>
</nav>

<!-- ========== Picker(下からの選択シート) ========== -->
<div class="picker" id="picker" aria-hidden="true">
  <div class="picker-backdrop" id="pickerBackdrop"></div>
  <div class="picker-panel">
    <div class="picker-head">
      <h3 id="pickerTitle">選択</h3>
      <button class="header-btn dark" id="pickerClose" aria-label="閉じる" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <div class="picker-list" id="pickerList"></div>

    <div class="picker-input-wrap" id="pickerInputWrap" hidden>
      <input type="text" id="pickerInput" placeholder="自由入力…" />
      <button class="btn btn-primary" id="pickerInputConfirm" type="button">追加</button>
    </div>

    <div class="picker-footer" id="pickerFooter" hidden></div>
  </div>
</div>

<!-- ========== トースト・ローディング ========== -->
<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<div class="modal" id="loadingModal" aria-hidden="true">
  <div class="modal-backdrop"></div>
  <div class="modal-panel">
    <div class="spinner" aria-hidden="true"></div>
    <p id="loadingText">処理中…</p>
  </div>
</div>

<script type="module" src="./js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW 登録失敗:', err));
  });
}
</script>

</body>
</html>
