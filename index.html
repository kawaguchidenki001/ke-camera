<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0d9aa0" />
  <meta name="description" content="県営北方住宅 LED 改修工事 専用 小黒板カメラ" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="北方カメラ" />

  <title>北方カメラ</title>

  <link rel="manifest" href="./manifest.json?v=1.7.0" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg?v=1.7.0" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png?v=1.7.0" />
  <link rel="stylesheet" href="./style.css?v=1.7.0" />

  <script>
  window.__KITAGATA_BUILD__ = "1.7.0";
  window.__KITAGATA_FALLBACK_CONFIG__ = {
    GAS_WEB_APP_URL: "https://script.google.com/macros/s/AKfycbxNLOTttmi766ZZlWWe3hp4LUV7lw6zXTzxOFoMTSeqIz_hIslb4caasipD7w_MgA6M9Q/exec",
    SHARED_TOKEN: "kitagata-photo-2026"
  };
  (async function() {
    const params = new URLSearchParams(location.search);
    if (!params.has("reset")) return;
    try {
      if ("serviceWorker" in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      if ("caches" in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } catch (e) {
      console.warn("reset failed", e);
    } finally {
      const url = new URL(location.href);
      url.searchParams.delete("reset");
      url.searchParams.set("v", "1.7.0");
      location.replace(url.toString());
    }
  })();
  </script>
</head>
<body>

<header class="app-header" id="appHeader">
  <button class="header-btn" id="btnMenu" aria-label="メニュー" type="button">
    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
      <path fill="currentColor" d="M3 6h18v2H3zM3 11h18v2H3zM3 16h18v2H3z"/>
    </svg>
  </button>
  <h1 class="app-title">北方カメラ</h1>
  <button class="header-btn" id="authStatusBtn" aria-label="接続状態" type="button">
    <span id="authIndicator" class="auth-indicator off" aria-hidden="true"></span>
  </button>
</header>

<main class="app-main" id="appMain">

  <!-- ========== カメラ画面(起動時から表示) ========== -->
  <section class="screen active camera-screen" data-screen="camera">

    <!-- 選択チップ 4 つ -->
    <div class="chip-row" id="chipRow">
      <button class="chip" id="chipBuilding" type="button">
        <span class="chip-label">棟</span>
        <span class="chip-value" id="chipBuildingVal">—</span>
      </button>
      <button class="chip" id="chipRoom" type="button">
        <span class="chip-label">部屋</span>
        <span class="chip-value" id="chipRoomVal">—</span>
      </button>
      <button class="chip" id="chipFixture" type="button">
        <span class="chip-label">照明器具</span>
        <span class="chip-value" id="chipFixtureVal">—</span>
      </button>
    </div>

        <!-- カメラビュー + 黒板オーバーレイ -->
    <div class="bcam-wrap" id="bcamWrap">
      <video id="videoEl" autoplay playsinline muted></video>
      <div class="bcam-tools">
        <button class="bcam-tool" id="btnSwitchCamera" aria-label="カメラ切替" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 5h-3.17L15 3H9L7.17 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zM12 18a5 5 0 0 1-5-5H5l3-3 3 3H9a3 3 0 0 0 3 3 3 3 0 0 0 0-6"/></svg>
        </button>
        <button class="bcam-tool" id="btnLight" aria-label="ライト" type="button" hidden>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M9 2h6l-1 8h3l-6 12 1-9H8z"/></svg>
        </button>
      </div>
      <div class="bov-bd" id="boardOverlay" style="display:none;"></div>
      <div class="zoom-badge" id="zoomBadge" hidden>1.0×</div>
    </div>

    <!-- 施工段階ボタン(画像の下) -->
    <div class="stage-picker" id="stagePicker">
      <div class="stage-picker-label">施工段階</div>
      <div class="stage-buttons" id="stageButtons" role="group" aria-label="施工段階"></div>
    </div>

    <!-- 次の連番ヒント(小) -->
    <p class="next-hint" id="nextSeqHint"></p>

    <!-- 直前に撮った写真(その場でやり直し) -->
    <div class="last-shot" id="lastShot" hidden>
      <div class="ls-thumb"><img id="lastShotImg" alt="直前に撮った写真" /></div>
      <div class="ls-body">
        <span class="ls-title">直前の写真</span>
        <span class="ls-name" id="lastShotName"></span>
      </div>
      <button class="ls-redo" id="btnRedoShot" type="button" aria-label="この写真を削除してやり直す">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L3 8"/></svg>
        やり直し
      </button>
    </div>

    <!-- 未送信カード(あれば表示) -->
    <button class="outbox-card" id="outboxCard" type="button" hidden>
      <div class="oc-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M19 8h-3V3H8v5H5l7 7 7-7zM5 19v2h14v-2H5z" transform="rotate(180 12 12)"/>
        </svg>
      </div>
      <div class="oc-body">
        <span class="oc-title">未送信の写真</span>
        <span class="oc-count" id="outboxCount">0 枚</span>
      </div>
      <span class="oc-chevron" aria-hidden="true">›</span>
    </button>

    <!-- 撮影ボタン(下部固定) -->
    <div class="bshoot-bar">
      <button class="savebtn" id="btnShoot" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5a2 2 0 0 1 2-2h1.6l1.4-2h6l1.4 2H19a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><circle cx="12" cy="12.5" r="3"/></svg>
        撮影して保存
      </button>
    </div>
  </section>

  <!-- ========== Outbox 画面 ========== -->
  <section class="screen" data-screen="outbox">
    <div class="screen-head">
      <button class="header-btn dark" id="btnOutboxBack" aria-label="戻る" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20z"/></svg>
      </button>
      <h2>未送信写真</h2>
      <span class="outbox-summary" id="outboxSummary"></span>
    </div>

    <div class="outbox-actions">
      <button class="btn btn-primary btn-lg" id="btnUploadAll" type="button">
        すべて Drive に送信
      </button>
      <button class="btn btn-ghost" id="btnRefreshOutbox" type="button">再読み込み</button>
    </div>

    <div class="outbox-progress" id="outboxProgress" hidden>
      <div class="op-bar"><div class="op-fill" id="opFill"></div></div>
      <p class="op-text" id="opText">送信中…</p>
    </div>

    <div class="outbox-list" id="outboxList"></div>

    <div class="outbox-empty" id="outboxEmpty" hidden>
      <p>未送信の写真はありません</p>
    </div>
  </section>

</main>

<!-- ========== メニュードロワー ========== -->
<nav class="menu" id="menu">
  <div class="menu-backdrop" data-close-menu></div>
  <div class="menu-panel">
    <div class="menu-head">
      <strong>北方カメラ</strong>
      <button class="header-btn dark" data-close-menu aria-label="閉じる" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <ul class="menu-list">
      <li><button id="menuPhotographer" type="button">撮影者を変更</button></li>
      <li><button id="menuReloadConfig" type="button">設定を再読み込み(Sheets)</button></li>
      <li><button id="menuTestGas" type="button">GAS 接続テスト</button></li>
      <li><button id="menuSetGasUrl" type="button">GAS URL設定</button></li>
      <li><button id="menuOutbox" type="button">未送信の写真</button></li>
      <li><button id="menuForceUpdate" type="button">アプリを更新(キャッシュ削除)</button></li>
      <li><button id="menuDebug" type="button">送信ログを表示</button></li>
    </ul>
    <div class="menu-foot">
      <p class="menu-version">小黒板カメラ <span id="appVersionMenu"></span></p>
      <p class="menu-config-source" id="configSource"></p>
      <p class="menu-photog-show" id="menuPhotogShow"></p>
    </div>
  </div>
</nav>

<!-- ========== Picker(下からの選択シート) ========== -->
<div class="picker" id="picker" aria-hidden="true">
  <div class="picker-backdrop" id="pickerBackdrop"></div>
  <div class="picker-panel">
    <div class="picker-head">
      <h3 id="pickerTitle">選択</h3>
      <button class="header-btn dark" id="pickerClose" aria-label="閉じる" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <div class="picker-list" id="pickerList"></div>

    <div class="picker-input-wrap" id="pickerInputWrap" hidden>
      <input type="text" id="pickerInput" placeholder="自由入力…" />
      <button class="btn btn-primary" id="pickerInputConfirm" type="button">追加</button>
    </div>

    <div class="picker-footer" id="pickerFooter" hidden></div>
  </div>
</div>

<!-- ========== トースト・ローディング ========== -->
<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<div class="modal" id="loadingModal" aria-hidden="true">
  <div class="modal-backdrop"></div>
  <div class="modal-panel">
    <div class="spinner" aria-hidden="true"></div>
    <p id="loadingText">処理中…</p>
  </div>
</div>

<!-- 送信ログ -->
<div class="menu" id="debugPanel">
  <div class="menu-backdrop" id="debugClose"></div>
  <div class="menu-panel" style="left:auto;right:0;width:min(92%,440px);">
    <div class="menu-head">
      <strong>送信ログ</strong>
      <button class="header-btn dark" id="debugClose2" aria-label="閉じる" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div id="debugLog" style="flex:1;overflow-y:auto;padding:12px 14px;font-family:monospace;font-size:11px;line-height:1.6;color:var(--ink);white-space:pre-wrap;word-break:break-all;"></div>
    <div class="menu-foot">
      <button class="btn btn-ghost" id="debugClear" type="button" style="width:100%;">ログを消去</button>
    </div>
  </div>
</div>

<!-- 隠し: 工事情報の値を保持する(画面表示しない) -->
<div hidden>
  <span id="projName"></span>
  <span id="projNumber"></span>
  <span id="projLocation"></span>
  <span id="projCompany"></span>
  <span id="appVersion"></span>
</div>

<script type="module" src="./js/app.js?v=1.7.0"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      location.reload();
    });
    navigator.serviceWorker.register('./sw.js?v=1.7.0', { updateViaCache: 'none' })
      .then(reg => {
        reg.update();
        if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      })
      .catch(err => console.warn('SW 登録失敗:', err));
  });
}
</script>

</body>
</html>
