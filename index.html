<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#1e4d2b" />
  <meta name="description" content="県営北方住宅 LED 改修工事 専用 小黒板カメラ" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="北方カメラ" />

  <title>北方カメラ</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />

  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<header class="app-header" id="appHeader">
  <button class="header-btn" id="btnMenu" aria-label="メニュー" type="button">
    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
      <path fill="currentColor" d="M3 6h18v2H3zM3 11h18v2H3zM3 16h18v2H3z"/>
    </svg>
  </button>
  <h1 class="app-title">北方カメラ</h1>
  <button class="header-btn" id="authStatusBtn" aria-label="認証状態" type="button">
    <span id="authIndicator" class="auth-indicator off" aria-hidden="true"></span>
  </button>
</header>

<main class="app-main" id="appMain">

  <!-- ========== スプラッシュ ========== -->
  <section class="screen active" data-screen="splash">
    <div class="splash-wrap">
      <div class="splash-icon" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="80" height="80">
          <rect x="6" y="14" width="52" height="40" rx="6" fill="#1e4d2b" stroke="#fff" stroke-width="2"/>
          <circle cx="48" cy="22" r="3" fill="#fbbf24"/>
          <text x="32" y="40" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="9" font-weight="bold">工事黒板</text>
        </svg>
      </div>

      <h2 class="splash-title" id="projName">県営北方住宅...</h2>
      <p class="splash-sub">
        <span id="projNumber">県住工第1号</span>
        ・
        <span id="projLocation">本巣郡北方町</span>
      </p>
      <p class="splash-company"><span id="projCompany">河口電機株式会社</span></p>

      <div class="splash-actions">
        <button class="btn btn-primary btn-xl" id="btnLoginSplash" type="button">
          Google でログイン
        </button>
      </div>

      <p class="splash-version">小黒板カメラ <span id="appVersion">v1.0.0</span></p>
    </div>
  </section>

  <!-- ========== ホーム(選択画面) ========== -->
  <section class="screen" data-screen="home">
    <div class="home-project">
      <span class="hp-num" id="projNumberHome">県住工第1号</span>
      <span class="hp-name">県営北方住宅 LED 改修</span>
    </div>

    <div class="card-group">

      <button class="big-card" id="cardPhotographer" type="button">
        <span class="bc-label">撮影者</span>
        <span class="bc-value" id="cardPhotographerVal">未設定</span>
        <span class="bc-chevron" aria-hidden="true">›</span>
      </button>

      <button class="big-card" id="cardBuilding" type="button">
        <span class="bc-label">棟</span>
        <span class="bc-value" id="cardBuildingVal">未選択</span>
        <span class="bc-chevron" aria-hidden="true">›</span>
      </button>

      <button class="big-card" id="cardRoom" type="button">
        <span class="bc-label">部屋</span>
        <span class="bc-value" id="cardRoomVal">未選択</span>
        <span class="bc-chevron" aria-hidden="true">›</span>
      </button>

      <button class="big-card" id="cardType" type="button">
        <span class="bc-label">撮影内容</span>
        <span class="bc-value" id="cardTypeVal">未選択</span>
        <span class="bc-chevron" aria-hidden="true">›</span>
      </button>

    </div>

    <p class="next-hint" id="nextSeqHint"></p>

    <button class="btn btn-primary btn-xl shutter-go" id="btnGoCamera" type="button" disabled>
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="currentColor" d="M9.4 5L8 7H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2h-4l-1.4-2H9.4zM12 17a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
      </svg>
      カメラを起動
    </button>
  </section>

  <!-- ========== カメラ画面 ========== -->
  <section class="screen camera-screen" data-screen="camera">
    <div class="camera-viewport">
      <video id="videoEl" playsinline muted autoplay></video>

      <div class="cam-badges">
        <div class="cam-badge" id="camLocationBadge">
          <small>場所</small><span>A1-101</span>
        </div>
        <button class="cam-badge accent" id="camTypeBadge" type="button">
          <small>撮影内容(タップで変更)</small><span>選択</span>
        </button>
        <div class="cam-badge" id="camPhotographerBadge">
          <small>撮影者</small><span>—</span>
        </div>
      </div>

      <div class="camera-info" id="camInfo">準備中…</div>
    </div>

    <div class="camera-controls">
      <button class="cc-btn" id="btnCameraBack" aria-label="戻る" type="button">
        <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20z"/></svg>
      </button>

      <button class="shutter" id="btnShutter" aria-label="シャッター" type="button">
        <span class="shutter-inner"></span>
      </button>

      <button class="cc-btn" id="btnSwitchCamera" aria-label="カメラ切替" type="button">
        <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5h-2l3-3 3 3H9c0 1.65 1.35 3 3 3s3-1.35 3-3h2c0 2.76-2.24 5-5 5z"/></svg>
      </button>
    </div>
  </section>

  <!-- ========== プレビュー画面 ========== -->
  <section class="screen preview-screen" data-screen="preview">
    <div class="preview-viewport">
      <img id="previewImg" alt="撮影プレビュー" />
    </div>

    <div class="preview-status">
      <span id="previewStatusText">確認してください</span>
    </div>

    <div class="preview-controls">
      <button class="btn btn-ghost btn-lg" id="btnRetake" type="button">撮り直し</button>
      <button class="btn btn-primary btn-lg" id="btnUpload" type="button">Drive に保存</button>
    </div>
  </section>

</main>

<!-- ========== メニュードロワー ========== -->
<nav class="menu" id="menu">
  <div class="menu-backdrop" data-close-menu></div>
  <div class="menu-panel">
    <div class="menu-head">
      <strong>北方カメラ</strong>
      <button class="header-btn dark" data-close-menu aria-label="閉じる" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <ul class="menu-list">
      <li><button id="menuChangePhoto" type="button">撮影者を変更</button></li>
      <li><button id="menuSignOut" type="button">サインアウト</button></li>
    </ul>
    <div class="menu-foot">
      <p class="menu-version">小黒板カメラ <span id="appVersionMenu"></span></p>
    </div>
  </div>
</nav>

<!-- ========== Picker(下からの選択シート) ========== -->
<div class="picker" id="picker" aria-hidden="true">
  <div class="picker-backdrop" id="pickerBackdrop"></div>
  <div class="picker-panel">
    <div class="picker-head">
      <h3 id="pickerTitle">選択</h3>
      <button class="header-btn dark" id="pickerClose" aria-label="閉じる" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <div class="picker-list" id="pickerList"></div>

    <div class="picker-input-wrap" id="pickerInputWrap" hidden>
      <input type="text" id="pickerInput" placeholder="自由入力…" />
      <button class="btn btn-primary" id="pickerInputConfirm" type="button">追加</button>
    </div>

    <div class="picker-footer" id="pickerFooter" hidden></div>
  </div>
</div>

<!-- ========== トースト・ローディング ========== -->
<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<div class="modal" id="loadingModal" aria-hidden="true">
  <div class="modal-backdrop"></div>
  <div class="modal-panel">
    <div class="spinner" aria-hidden="true"></div>
    <p id="loadingText">処理中…</p>
  </div>
</div>

<script type="module" src="./js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW 登録失敗:', err));
  });
}
</script>

</body>
</html>
