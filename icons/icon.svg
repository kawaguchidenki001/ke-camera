<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff5f5"/>
      <stop offset="1" stop-color="#a3d8d8"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a8c78"/>
      <stop offset="1" stop-color="#156e5e"/>
    </linearGradient>
  </defs>

  <!-- 背景(角丸) -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- カメラ本体 -->
  <g>
    <rect x="60" y="170" width="392" height="250" rx="32" fill="#e8ecf2" stroke="#0d9aa0" stroke-width="8"/>
    <!-- 上部の出っ張り(レンズシャッター部分) -->
    <path d="M 200 170 L 220 130 L 292 130 L 312 170 Z" fill="#e8ecf2" stroke="#0d9aa0" stroke-width="8"/>

    <!-- レンズ外側 -->
    <circle cx="256" cy="290" r="85" fill="#0d9aa0"/>
    <circle cx="256" cy="290" r="75" fill="#0a7d82"/>
    <circle cx="256" cy="290" r="60" fill="#173a3c"/>
    <!-- レンズ反射 -->
    <circle cx="230" cy="270" r="18" fill="rgba(255,255,255,0.32)"/>

    <!-- フラッシュ -->
    <circle cx="400" cy="220" r="14" fill="#fbbf24"/>
  </g>

  <!-- 黒板(下部に小さく重ねる) -->
  <g>
    <rect x="120" y="395" width="272" height="60" rx="6" fill="url(#board)" stroke="#fff" stroke-width="4"/>
    <line x1="130" y1="415" x2="382" y2="415" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="130" y1="430" x2="382" y2="430" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="180" y1="400" x2="180" y2="450" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  </g>
</svg>
