<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e6a3e"/>
      <stop offset="1" stop-color="#143a1f"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e4d2b"/>
      <stop offset="1" stop-color="#143a1f"/>
    </linearGradient>
    <radialGradient id="bulb" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#fff8c5"/>
      <stop offset="0.5" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d39a17"/>
    </radialGradient>
  </defs>

  <!-- 角丸背景 -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- 黒板(下半分) -->
  <g>
    <rect x="60" y="240" width="392" height="200" rx="16" fill="url(#board)" stroke="#ffffff" stroke-width="6"/>
    <!-- 黒板の中の罫線(4行) -->
    <line x1="84" y1="282" x2="428" y2="282" stroke="rgba(255,255,255,0.45)" stroke-width="3"/>
    <line x1="84" y1="324" x2="428" y2="324" stroke="rgba(255,255,255,0.45)" stroke-width="3"/>
    <line x1="84" y1="366" x2="428" y2="366" stroke="rgba(255,255,255,0.45)" stroke-width="3"/>
    <line x1="84" y1="408" x2="428" y2="408" stroke="rgba(255,255,255,0.45)" stroke-width="3"/>
    <!-- 縦線 -->
    <line x1="240" y1="282" x2="240" y2="408" stroke="rgba(255,255,255,0.45)" stroke-width="3"/>
  </g>

  <!-- LED 電球シンボル(中央上) -->
  <g transform="translate(256, 156)">
    <!-- 光線 -->
    <g stroke="#fbbf24" stroke-width="6" stroke-linecap="round" opacity="0.85">
      <line x1="0" y1="-90" x2="0" y2="-70"/>
      <line x1="-78" y1="-45" x2="-62" y2="-32"/>
      <line x1="78" y1="-45" x2="62" y2="-32"/>
      <line x1="-90" y1="0" x2="-70" y2="0"/>
      <line x1="90" y1="0" x2="70" y2="0"/>
    </g>
    <!-- 電球本体 -->
    <circle cx="0" cy="0" r="56" fill="url(#bulb)" stroke="#ffffff" stroke-width="6"/>
    <!-- フィラメント -->
    <path d="M -18 8 Q 0 -24 18 8" fill="none" stroke="#d39a17" stroke-width="3" stroke-linecap="round"/>
    <!-- 口金 -->
    <rect x="-22" y="48" width="44" height="18" rx="4" fill="#0f2916" stroke="#ffffff" stroke-width="3"/>
    <line x1="-18" y1="58" x2="18" y2="58" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
  </g>
</svg>
